<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            z-index: -1;
            overflow: hidden;
        }

        .background canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        #loginForm {
            position: relative;
            width: 300px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transform: rotateY(90deg);
            opacity: 0;
            transition: transform 1s ease-in-out, opacity 1s ease-in-out;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            transition: border 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
        }

        input:focus {
            outline: none;
            border: 1px solid #6a11cb;
            box-shadow: 0 0 8px #6a11cb;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #2a5298;
        }

        #goBack {
            background: #ccc;
        }

        #goBack:hover {
            background: #999;
        }
    </style>
</head>
<body>
    <div class="background">
        <canvas id="particlesCanvas"></canvas>
    </div>
    <div id="loginForm">
        <h2>Admin Login</h2>
        <form action="admin_login.php" method="post">
        <input type="text" name="email" placeholder="Username" required>
        <input type="password"name="password" placeholder="Password" required>
        <button type="submit" name="submit">Login</button>
    </form>
        <button id="goBack">Go Back</button>
    </div>
    <script>
        // Trigger login form animation on page load
        const loginForm = document.getElementById('loginForm');
        window.onload = () => {
            loginForm.style.transform = 'rotateY(0)';
            loginForm.style.opacity = '1';
        };

        // "Go Back" button redirect to home.html
        const goBackButton = document.getElementById('goBack');
        goBackButton.addEventListener('click', () => {
            window.location.href = 'home.html';
        });

        // Glowing particles animation
        const canvas = document.getElementById('particlesCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particlesArray = [];
        const colors = ['#ffffff', '#a3d5ff', '#6a11cb', '#2575fc'];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 4 + 1;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Bounce off edges
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 150; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach((particle) => {
                particle.update();
                particle.draw();
            });
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
