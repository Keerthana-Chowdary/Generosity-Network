    <script>

    const form = document.querySelector('form'); // Select the form
    const sendButton = document.getElementById('sendLetter'); // Select the send button

    form.addEventListener('submit', function (event) {
        // Prevent default form submission
        event.preventDefault();

        // Trigger the animation by adding the "sent" class
        document.body.classList.add('sent');

        // Wait for the animation to complete (adjust timing if needed)
        setTimeout(function () {
            // Submit the form programmatically
            form.submit();
        }, 6000); // 3000ms = 3 seconds for animation
    });
